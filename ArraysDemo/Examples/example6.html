
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            font-size: 28px;
            font-family: Arial, Helvetica, sans-serif;
            margin:25px;
        }
    </style>
</head>
<body>
        <label for="">Enter a number</label>
        <input type="text" id=" value1">
        <button id ="CheckSumButton" onclick ="CalculateSum()">CalculateSum</button>
        <h2 id="ans"></h2>
    <script>
        function CalculateSum(){
            let val=parseInt(document.getElementById("Value1").value);
            const ans=parseInt(document.getElementById("ans"));
                if(isNaN(val)){
                    ans.innerHTML="enter a valid number";
                    return;
                }
                let Sum=0;
                while(val!=0){
                    Sum=Sum+ val%10;
                    val=val/10;
                    val=math.floor(val);
                }
                 ans.innerHTML='Sum ${Sum}';
            }
    </script>
</body>
</html>
